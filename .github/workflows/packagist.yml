name: Update Packagist

on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    workflow_dispatch:

jobs:
    update-packagist:
        runs-on: ubuntu-latest

        steps:
            - name: Notify Packagist
              env:
                  PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
                  PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
              run: |
                  if [ -z "${PACKAGIST_USERNAME}" ] || [ -z "${PACKAGIST_API_TOKEN}" ]; then
                    echo "Missing PACKAGIST_USERNAME or PACKAGIST_API_TOKEN secret"
                    exit 1
                  fi

                  curl --fail-with-body --silent --show-error \
                    -X POST \
                    -H 'content-type: application/json' \
                    "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
                    -d "{\"repository\":{\"url\":\"https://github.com/${GITHUB_REPOSITORY}\"}}"
